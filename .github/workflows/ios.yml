name: Build Native iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build unsigned IPA
        run: |
          # 1. Find the exact name of the Xcode project file you uploaded
          PROJECT_FILE=$(ls -d *.xcodeproj | head -n 1)
          echo "==> FOUND PROJECT: $PROJECT_FILE"
          
          # 2. Force Xcode to wake up and generate user schemes
          xcodebuild -project "$PROJECT_FILE" -list > /dev/null 2>&1 || true
          
          # 3. Dynamically extract the exact scheme name
          SCHEME=$(xcodebuild -project "$PROJECT_FILE" -list | awk '/Schemes:/{flag=1; next} flag&&NF{print $0}' | head -n 1 | xargs)
          echo "==> DETECTED SCHEME: '$SCHEME' <=="
          
          # 4. Build the app using your project
          xcodebuild build -project "$PROJECT_FILE" -scheme "$SCHEME" -configuration Release -arch arm64 -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build
          
          # 5. Package the built app into an .ipa file
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r App.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnakeAI-IPA
          path: App.ipa
