name: iOS Build SnakeAI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build iOS App
        run: |
          xcodebuild \
          -project SnakeAI.xcodeproj \
          -scheme SnakeAI \
          -sdk iphoneos \
          -configuration Release \
          clean build \
          CODE_SIGNING_ALLOWED=NO

      - name: Find app
        run: |
          mkdir Payload
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
          cp -r "$APP" Payload/

      - name: Create IPA
        run: zip -r SnakeAI.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: SnakeAI
          path: SnakeAI.ipa
